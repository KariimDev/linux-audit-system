# =============================================================
# audit.conf - Main configuration file for the audit system
# =============================================================

# -------------------------------------------------------------
# GENERAL SETTINGS
# -------------------------------------------------------------
HOSTNAME=$(hostname)

# Store reports inside the project folder so no sudo is needed
# Change this to /var/log/sys_audit if you're running as root
REPORT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)/reports"

# log directory (absolute path resolved in utils.sh)
LOG_DIR="logs"

# -------------------------------------------------------------
# REPORT SETTINGS
# -------------------------------------------------------------
REPORT_TYPE="full"
REPORT_FORMAT="txt"

# -------------------------------------------------------------
# EMAIL SETTINGS
# -------------------------------------------------------------
# All email credentials and recipient settings are in config/email.conf
# That file is gitignored — never push it to GitHub

# -------------------------------------------------------------
# AUTOMATION SETTINGS
# -------------------------------------------------------------
CRON_SCHEDULE="0 4 * * *"

# -------------------------------------------------------------
# REMOTE MONITORING SETTINGS
# -------------------------------------------------------------
REMOTE_HOST="<REMOTE_SERVER_IP>"
REMOTE_USER="<SSH_USERNAME>"
REMOTE_DIR="/tmp/audit_reports"

# -------------------------------------------------------------
# ALERT SETTINGS
# -------------------------------------------------------------
CPU_THRESHOLD=80