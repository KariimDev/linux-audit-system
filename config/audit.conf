# =============================================================
# audit.conf - Main configuration file for the audit system
# =============================================================

# -------------------------------------------------------------
# GENERAL SETTINGS
# -------------------------------------------------------------
# hostname of the machine
HOSTNAME=$(hostname)

# audit report directory
REPORT_DIR="/var/log/sys_audit"

# log directory
LOG_DIR="logs"

# -------------------------------------------------------------
# REPORT SETTINGS
# -------------------------------------------------------------
# report types: short or full
REPORT_TYPE="full"

# report formats: txt, html, json
REPORT_FORMAT="txt"

# -------------------------------------------------------------
# EMAIL SETTINGS
# -------------------------------------------------------------
# recipient email address
EMAIL_RECIPIENT="recipient@example.com"

# sender email address
EMAIL_SENDER="sender@example.com"

# email subject
EMAIL_SUBJECT="Linux Audit Report - $HOSTNAME"

# -------------------------------------------------------------
# AUTOMATION SETTINGS
# -------------------------------------------------------------
# cron schedule (every day at 4:00 AM)
CRON_SCHEDULE="0 4 * * *"

# -------------------------------------------------------------
# REMOTE MONITORING SETTINGS
# -------------------------------------------------------------
# remote server IP address
REMOTE_HOST="192.168.1.100"

# remote server username
REMOTE_USER="admin"

# remote server report directory
REMOTE_DIR="/var/log/sys_audit"

# -------------------------------------------------------------
# ALERT SETTINGS (BONUS)
# -------------------------------------------------------------
# CPU usage threshold for alerts (%)
CPU_THRESHOLD=80

# RAM usage threshold for alerts (%)
RAM_THRESHOLD=80